<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GlobeSwift | Elite Shipment Intelligence Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ========== YOUR EXISTING DOPE STYLES - KEEP ALL ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; overflow-x: hidden; }
        .bg-premium { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(ellipse at 30% 40%, #0a0a2a, #030308); }
        .grid-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,242,254,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,254,0.04) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; animation: gridDrift 25s linear infinite; }
        @keyframes gridDrift { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; animation: floatOrb 20s ease-in-out infinite; }
        @keyframes floatOrb { 0%,100% { transform: translate(0,0) scale(1); opacity:0.2; } 50% { transform: translate(50px,-30px) scale(1.2); opacity:0.35; } }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.6s cubic-bezier(0.2,0.9,0.4,1.1); }
        .loader-content { text-align: center; }
        .loader-ring { position: relative; width: 100px; height: 100px; margin: 0 auto 2rem; }
        .loader-ring svg { width: 100%; height: 100%; animation: spinRing 1.2s linear infinite; }
        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-size: 0.9rem; letter-spacing: 3px; background: linear-gradient(135deg,#fff,#00f2fe); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 500; }
        .loader-dots { display: flex; justify-content: center; gap: 8px; margin-top: 1rem; }
        .loader-dot { width: 6px; height: 6px; background: #00f2fe; border-radius: 50%; animation: dotPulse 1.2s ease-in-out infinite; }
        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity:0.3; } 40% { transform: scale(1.2); opacity:1; } }
        .navbar { position: sticky; top: 0; z-index: 1000; padding: 1rem 5%; background: rgba(10,10,15,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,242,254,0.25); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg,#fff,#00f2fe); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; font-family: 'Space Grotesk', monospace; }
        .back-link { color: #00f2fe; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: 0.3s; padding: 0.5rem 1rem; background: rgba(0,242,254,0.1); border-radius: 50px; }
        .back-link:hover { gap: 0.8rem; background: rgba(0,242,254,0.2); }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 5%; }
        .tracking-header { background: linear-gradient(135deg, rgba(0,242,254,0.08), rgba(0,224,255,0.02)); border-radius: 32px; padding: 2rem; margin-bottom: 2rem; border: 1px solid rgba(0,242,254,0.3); backdrop-filter: blur(10px); position: relative; overflow: hidden; }
        .tracking-header::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,242,254,0.1), transparent); animation: shimmer 3s infinite; }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 200%; } }
        .tracking-number-box { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        .tracking-number { font-size: 1.8rem; font-family: monospace; letter-spacing: 2px; font-weight: 700; background: rgba(0,242,254,0.1); padding: 0.4rem 1.2rem; border-radius: 60px; border: 1px solid rgba(0,242,254,0.3); }
        .verified-badge { background: rgba(0,255,0,0.12); padding: 0.4rem 1.2rem; border-radius: 60px; font-size: 0.8rem; color: #0f0; border: 1px solid rgba(0,255,0,0.3); }
        .status-badge { display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.7rem 1.8rem; border-radius: 60px; font-weight: 600; margin-top: 1rem; font-size: 0.9rem; }
        .status-order_confirmed { background: linear-gradient(135deg, rgba(0,242,254,0.2), rgba(0,242,254,0.05)); color: #00f2fe; border: 1px solid rgba(0,242,254,0.5); }
        .status-picked { background: linear-gradient(135deg, rgba(255,165,0,0.2), rgba(255,165,0,0.05)); color: #ffa500; border: 1px solid rgba(255,165,0,0.5); }
        .status-onway { background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(0,255,255,0.05)); color: #0ff; border: 1px solid rgba(0,255,255,0.5); }
        .status-customs { background: linear-gradient(135deg, rgba(255,68,68,0.2), rgba(255,68,68,0.05)); color: #ff4444; border: 1px solid rgba(255,68,68,0.5); }
        .status-delivered { background: linear-gradient(135deg, rgba(0,255,0,0.2), rgba(0,255,0,0.05)); color: #0f0; border: 1px solid rgba(0,255,0,0.5); }
        .last-updated { color: #888; font-size: 0.75rem; margin-top: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .tracking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        @media (max-width: 768px) { .tracking-grid { grid-template-columns: 1fr; } }
        .info-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(10px); border-radius: 28px; padding: 1.8rem; border: 1px solid rgba(255,255,255,0.08); transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1.1); }
        .info-card:hover { border-color: rgba(0,242,254,0.4); transform: translateY(-3px); background: rgba(255,255,255,0.04); }
        .info-card h3 { margin-bottom: 1.5rem; font-size: 1.2rem; display: flex; align-items: center; gap: 0.6rem; color: #00f2fe; letter-spacing: -0.3px; }
        .info-row { display: flex; justify-content: space-between; padding: 0.9rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; font-size: 0.85rem; }
        .info-value { font-weight: 500; font-size: 0.9rem; }
        .timeline { position: relative; padding-left: 2rem; }
        .timeline-item { position: relative; padding-bottom: 2rem; padding-left: 1.5rem; border-left: 2px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .timeline-item::before { content: ''; position: absolute; left: -9px; top: 0; width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid #00f2fe; transition: all 0.3s; }
        .timeline-item.completed::before { background: #00f2fe; box-shadow: 0 0 12px #00f2fe; }
        .timeline-item.active::before { background: #00f2fe; box-shadow: 0 0 20px #00f2fe; animation: pulseGlow 1.2s infinite; }
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 5px #00f2fe; transform: scale(1); } 50% { box-shadow: 0 0 20px #00f2fe; transform: scale(1.1); } }
        .timeline-date { font-size: 0.7rem; color: #888; margin-bottom: 0.3rem; font-family: monospace; }
        .timeline-title { font-weight: 600; margin-bottom: 0.3rem; font-size: 0.95rem; }
        .timeline-desc { font-size: 0.8rem; color: #aaa; }
        .map-container { background: rgba(255,255,255,0.02); border-radius: 28px; overflow: hidden; margin-bottom: 2rem; border: 1px solid rgba(0,242,254,0.2); }
        #map { height: 380px; width: 100%; background: #0f0f1a; }
        .map-caption { padding: 1rem; text-align: center; color: #666; font-size: 0.8rem; background: rgba(0,0,0,0.4); }
        .action-buttons { display: flex; gap: 1rem; margin-top: 1rem; }
        .print-btn, .share-btn { flex: 1; background: linear-gradient(135deg,#00f2fe,#00e0ff); border: none; padding: 1rem; border-radius: 60px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: all 0.3s; color: #0a0a0f; }
        .share-btn { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .print-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,242,254,0.3); }
        .share-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .not-found { text-align: center; padding: 5rem 2rem; background: rgba(255,255,255,0.02); border-radius: 32px; border: 1px solid rgba(255,68,68,0.3); }
        .not-found i { font-size: 4rem; color: #ff4444; margin-bottom: 1.5rem; }
        .not-found h2 { font-size: 1.8rem; margin-bottom: 1rem; }
        .not-found p { color: #888; margin-bottom: 2rem; }
        .not-found-btn { display: inline-block; background: linear-gradient(135deg,#00f2fe,#00e0ff); padding: 0.8rem 2rem; border-radius: 50px; text-decoration: none; color: #0a0a0f; font-weight: 600; }
        .footer { background: #030308; padding: 2rem 5%; text-align: center; color: #666; margin-top: 3rem; border-top: 1px solid rgba(0,242,254,0.1); font-size: 0.8rem; }

        /* ========== PRINT STYLES - INVOICE PDF ========== */
        @media print {
            .navbar, .back-link, .action-buttons, .footer, .map-container, .grid-lines, .orb, .bg-premium, .tracking-header::before, .loader-overlay { display: none !important; }
            body { background: white !important; color: black !important; margin: 0 !important; padding: 0 !important; }
            .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .invoice-print { display: block !important; padding: 20px !important; font-family: 'Inter', sans-serif !important; }
            .tracking-header, .tracking-grid, .info-card, .timeline { display: none !important; }
        }
        .invoice-print { display: none; }
    </style>
</head>
<body>
    <div class="bg-premium"></div>
    <div class="grid-lines"></div>
    <div class="orb" style="width: 300px; height: 300px; background: rgba(0,242,254,0.08); top: 10%; left: -80px;"></div>
    <div class="orb" style="width: 400px; height: 400px; background: rgba(0,242,254,0.06); bottom: 0%; right: -120px; animation-duration: 25s;"></div>

    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-content">
            <div class="loader-ring"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="rgba(0,242,254,0.2)" stroke-width="3"/><circle cx="50" cy="50" r="45" fill="none" stroke="#00f2fe" stroke-width="3" stroke-dasharray="70 210" stroke-linecap="round"/></svg></div>
            <div class="loader-text">ANALYSING PACKAGE DATA</div>
            <div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Globe<span style="color:#00f2fe">Swift</span></a>
            <a href="tracking.html" class="back-link"><i class="fas fa-arrow-left"></i> New Tracking</a>
        </div>
    </nav>

    <div class="container" id="trackingContent">
        <div style="text-align: center; padding: 4rem;">
            <i class="fas fa-cloud-upload-alt fa-spin" style="font-size: 2.5rem; color: #00f2fe;"></i>
            <p style="margin-top: 1rem; color: #888;">Fetching package data...</p>
        </div>
    </div>

    <div id="invoicePrint" class="invoice-print"></div>

    <footer class="footer"><p><i class="fas fa-cloud"></i> GlobeSwift Elite</p></footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = window.location.origin;
        let shipmentData = null;
        let trackingNumber = localStorage.getItem('trackingNumber');
        if (!trackingNumber) trackingNumber = 'GL-3722-TAB2NLX6';
        trackingNumber = trackingNumber.toUpperCase();

        async function fetchShipmentFromCloud(code) {
            try {
                const response = await fetch(`${API_URL}/api/shipments/${code}`);
                if (!response.ok) { if (response.status === 404) return null; throw new Error('Network error'); }
                return await response.json();
            } catch (error) { console.error('Error:', error); return null; }
        }

        function getStatusClass(status) {
            const map = { 'order_confirmed':'status-order_confirmed','picked':'status-picked','onway':'status-onway','customs':'status-customs','delivered':'status-delivered' };
            return map[status] || 'status-order_confirmed';
        }

        async function renderTracking() {
            const container = document.getElementById('trackingContent');
            container.innerHTML = `<div style="text-align:center;padding:4rem;"><i class="fas fa-spinner fa-spin" style="font-size:2.5rem;color:#00f2fe;"></i><p style="margin-top:1rem;">Fetching data...</p></div>`;
            shipmentData = await fetchShipmentFromCloud(trackingNumber);
            if (!shipmentData) {
                container.innerHTML = `<div class="not-found"><i class="fas fa-search"></i><h2>Tracking Number Not Found</h2><p>${trackingNumber} does not exist</p><a href="tracking.html" class="not-found-btn">Try Again</a></div>`;
                return;
            }

            const statusClass = getStatusClass(shipmentData.status);
            const inv = shipmentData.invoice || {};
            const dutyAmount = shipmentData.parcel?.dutyFeesAmount || 'N/A';
            const dutyStatus = shipmentData.parcel?.dutyFeesStatus || 'N/A';
            const dutyDisplay = dutyAmount !== 'N/A' ? dutyAmount : dutyStatus;

            container.innerHTML = `
                <div class="tracking-header">
                    <div class="tracking-number-box">
                        <div class="tracking-number"><i class="fas fa-barcode"></i> ${trackingNumber}</div>
                        <div class="verified-badge"><i class="fas fa-cloud"></i> MongoDB Cloud | Verified</div>
                    </div>
                    <div><div class="status-badge ${statusClass}"><i class="fas ${shipmentData.status === 'delivered' ? 'fa-check-circle' : shipmentData.status === 'customs' ? 'fa-clock' : 'fa-truck'}"></i> ${shipmentData.statusText || shipmentData.status}</div></div>
                    <div class="last-updated"><i class="fas fa-clock"></i> Last Update: ${shipmentData.lastUpdated || new Date().toLocaleString()}</div>
                </div>
                <div class="tracking-grid">
                    <div>
                        <div class="info-card"><h3><i class="fas fa-user-tie"></i> Shipper</h3>
                            <div class="info-row"><span class="info-label">Name:</span><span class="info-value">${shipmentData.sender?.name || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Country:</span><span class="info-value">${shipmentData.sender?.country || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Address:</span><span class="info-value">${shipmentData.sender?.address || shipmentData.sender?.country || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Phone:</span><span class="info-value">${shipmentData.sender?.phone || 'N/A'}</span></div>
                        </div>
                        <div class="info-card" style="margin-top:1.5rem;"><h3><i class="fas fa-user-check"></i> Consignee</h3>
                            <div class="info-row"><span class="info-label">Name:</span><span class="info-value">${shipmentData.receiver?.name || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Country:</span><span class="info-value">${shipmentData.receiver?.country || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Address:</span><span class="info-value">${shipmentData.receiver?.address || shipmentData.receiver?.country || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Phone:</span><span class="info-value">${shipmentData.receiver?.phone || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Email:</span><span class="info-value">${shipmentData.receiver?.email || 'N/A'}</span></div>
                        </div>
                    </div>
                    <div>
                        <div class="info-card"><h3><i class="fas fa-cube"></i> Parcel Details</h3>
                            <div class="info-row"><span class="info-label">Duty Fees:</span><span class="info-value" style="color:${dutyStatus === 'Paid' ? '#0f0' : '#ffa500'}"><i class="fas ${dutyStatus === 'Paid' ? 'fa-check-circle' : 'fa-clock'}"></i> ${dutyDisplay}</span></div>
                            <div class="info-row"><span class="info-label">Weight:</span><span class="info-value">${shipmentData.parcel?.weight || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Type:</span><span class="info-value">${shipmentData.parcel?.type || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">Pickup:</span><span class="info-value">${shipmentData.parcel?.pickupDate || 'N/A'}</span></div>
                            <div class="info-row"><span class="info-label">ETA:</span><span class="info-value">${shipmentData.parcel?.expectedDelivery || 'Pending'}</span></div>
                        </div>
                        <div class="action-buttons">
                            <button class="print-btn" onclick="prepareAndPrint()"><i class="fas fa-print"></i> Print Receipt</button>
                            <button class="share-btn" onclick="copyTrackingLink()"><i class="fas fa-share-alt"></i> Share Tracking</button>
                        </div>
                    </div>
                </div>
                <div class="info-card"><h3><i class="fas fa-timeline"></i> Shipment Journey</h3><div class="timeline">${(shipmentData.timeline || []).map(item => `<div class="timeline-item ${item.completed ? 'completed' : ''} ${item.active ? 'active' : ''}"><div class="timeline-date">${item.date}</div><div class="timeline-title">${item.title}</div><div class="timeline-desc">${item.desc}</div></div>`).join('')}${(!shipmentData.timeline || shipmentData.timeline.length === 0) ? '<div style="color:#888;text-align:center;">Timeline pending</div>' : ''}</div></div>
                <div class="map-container"><div id="map"></div><div class="map-caption"><i class="fas fa-map-marker-alt"></i> Origin: ${shipmentData.origin || 'Unknown'} → Destination: ${shipmentData.destination || 'Unknown'}</div></div>
            `;

            setTimeout(() => {
                if (typeof L !== 'undefined') {
                    const coords = shipmentData.coordinates || [25.2048, 55.2708];
                    const map = L.map('map').setView(coords, 5);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
                    L.marker(coords).addTo(map).bindPopup(`Origin: ${shipmentData.origin}`).openPopup();
                }
            }, 100);
            buildInvoicePrint();
        }

        function buildInvoicePrint() {
            const inv = shipmentData.invoice || {};
            const now = new Date().toLocaleString();
            const statusClass = getStatusClass(shipmentData.status);
            const dutyAmount = shipmentData.parcel?.dutyFeesAmount || 'N/A';
            const dutyStatus = shipmentData.parcel?.dutyFeesStatus || 'N/A';
            const dutyDisplay = dutyAmount !== 'N/A' ? dutyAmount : dutyStatus;
            
            const invoiceHTML = `
                <div class="print-header" style="text-align:center; margin-bottom:20px; padding-bottom:15px; border-bottom:2px solid #00f2fe;">
                    <h1 style="font-size:24px; color:#00f2fe;">Globes Swift Logistics</h1>
                    <p style="color:#666; font-size:12px;">International Shipping & Logistics Services</p>
                    <p style="color:#666; font-size:11px;">support@globeswift.com | https://globeswift.com</p>
                </div>
                <div style="background:#f5f5f5; padding:10px 15px; margin-bottom:20px; display:flex; justify-content:space-between; border-left:4px solid #00f2fe;">
                    <span style="font-family:monospace; font-size:18px; font-weight:bold;"><i class="fas fa-barcode"></i> ${trackingNumber}</span>
                    <span style="padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; background:${statusClass === 'status-order_confirmed' ? 'rgba(0,242,254,0.2)' : statusClass === 'status-picked' ? 'rgba(255,165,0,0.2)' : statusClass === 'status-onway' ? 'rgba(0,255,255,0.2)' : statusClass === 'status-customs' ? 'rgba(255,68,68,0.2)' : 'rgba(0,255,0,0.2)'}; color:${statusClass === 'status-order_confirmed' ? '#00f2fe' : statusClass === 'status-picked' ? '#ffa500' : statusClass === 'status-onway' ? '#0ff' : statusClass === 'status-customs' ? '#ff4444' : '#0f0'}">${shipmentData.statusText || shipmentData.status}</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
                    <div style="border:1px solid #ddd; padding:12px; border-radius:8px;">
                        <h3 style="font-size:14px; font-weight:bold; margin-bottom:10px; color:#00f2fe;">SENDER</h3>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Name:</span><span>${shipmentData.sender?.name || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Country:</span><span>${shipmentData.sender?.country || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Address:</span><span>${shipmentData.sender?.address || shipmentData.sender?.country || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Phone:</span><span>${shipmentData.sender?.phone || 'N/A'}</span></div>
                    </div>
                    <div style="border:1px solid #ddd; padding:12px; border-radius:8px;">
                        <h3 style="font-size:14px; font-weight:bold; margin-bottom:10px; color:#00f2fe;">RECEIVER</h3>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Name:</span><span>${shipmentData.receiver?.name || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Country:</span><span>${shipmentData.receiver?.country || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Address:</span><span>${shipmentData.receiver?.address || shipmentData.receiver?.country || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Phone:</span><span>${shipmentData.receiver?.phone || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Email:</span><span>${shipmentData.receiver?.email || 'N/A'}</span></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
                    <div style="border:1px solid #ddd; padding:12px; border-radius:8px;">
                        <h3 style="font-size:14px; font-weight:bold; margin-bottom:10px; color:#00f2fe;">SHIPMENT DETAILS</h3>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Order ID:</span><span>${inv.orderId || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Booking Mode:</span><span>${inv.bookingMode || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Weight:</span><span>${shipmentData.parcel?.weight || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Type:</span><span>${shipmentData.parcel?.type || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Duty Fees:</span><span style="color:${dutyStatus === 'Paid' ? 'green' : 'orange'}">${dutyDisplay}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Pickup Date:</span><span>${shipmentData.parcel?.pickupDate || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Expected Delivery:</span><span>${shipmentData.parcel?.expectedDelivery || 'Pending'}</span></div>
                    </div>
                    <div style="border:1px solid #ddd; padding:12px; border-radius:8px;">
                        <h3 style="font-size:14px; font-weight:bold; margin-bottom:10px; color:#00f2fe;">PAYMENT SUMMARY</h3>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Shipping Cost:</span><span>${inv.shipmentCost || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Clearance Cost:</span><span>${inv.clearanceCost || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px; border-top:2px solid #00f2fe; margin-top:5px; padding-top:8px; font-weight:bold;"><span>TOTAL AMOUNT:</span><span>${inv.totalAmount || 'N/A'}</span></div>
                        <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span style="color:#666;">Payment Status:</span><span style="color:${inv.paymentStatus === 'Paid' ? 'green' : 'orange'}">${inv.paymentStatus || 'To Pay on Delivery'}</span></div>
                    </div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:20px; padding-top:15px; border-top:1px dashed #ccc;">
                    <div style="text-align:center;"><div style="font-size:30px;">📌</div><div>Official Stamp</div><small>Verified & Approved</small></div>
                    <div style="text-align:right;"><div style="width:60px; height:60px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; margin-bottom:5px; border-radius:8px;"><i class="fas fa-qrcode" style="font-size:30px;"></i></div><small>Scan to verify</small></div>
                </div>
                <div style="text-align:center; margin-top:20px; padding-top:15px; border-top:1px solid #eee; font-size:10px; color:#888;"><p><i class="fas fa-clock"></i> ${now}</p><p>Digitally signed and secured</p></div>
            `;
            document.getElementById('invoicePrint').innerHTML = invoiceHTML;
        }

        function prepareAndPrint() {
            const printContent = document.getElementById('invoicePrint').innerHTML;
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html><head><title>GlobeSwift Invoice - ${trackingNumber}</title>
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
                <style>
                    * { margin:0; padding:0; box-sizing:border-box; }
                    body { font-family:'Inter',sans-serif; padding:30px; background:white; color:black; }
                    @media print { body { margin:0; padding:20px; } }
                </style>
                </head><body>${printContent}<script>window.onload = () => { window.print(); setTimeout(() => window.close(), 500); }<\/script></body></html>
            `);
            printWindow.document.close();
        }

        function copyTrackingLink() { navigator.clipboard.writeText(window.location.href); alert('✓ Tracking link copied'); }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loaderOverlay');
                if (loader) { loader.style.opacity = '0'; setTimeout(() => { loader.style.display = 'none'; }, 600); }
                renderTracking();
            }, 500);
        });
    </script>
</body>
</html>
