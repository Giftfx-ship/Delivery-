<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GlobeSwift | Elite Shipment Intelligence Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* Premium Animated Background */
        .bg-premium {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at 30% 40%, #0a0a2a, #030308);
        }

        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,242,254,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,242,254,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridDrift 25s linear infinite;
        }

        @keyframes gridDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: floatOrb 20s ease-in-out infinite;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            50% { transform: translate(50px, -30px) scale(1.2); opacity: 0.35; }
        }

        /* Premium Loading Animation */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .loader-content {
            text-align: center;
        }

        .loader-ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
        }

        .loader-ring svg {
            width: 100%;
            height: 100%;
            animation: spinRing 1.2s linear infinite;
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 0.9rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 500;
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .loader-dot {
            width: 6px;
            height: 6px;
            background: #00f2fe;
            border-radius: 50%;
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 5%;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.25);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            font-family: 'Space Grotesk', monospace;
        }

        .back-link {
            color: #00f2fe;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: 0.3s;
            padding: 0.5rem 1rem;
            background: rgba(0,242,254,0.1);
            border-radius: 50px;
        }

        .back-link:hover {
            gap: 0.8rem;
            background: rgba(0,242,254,0.2);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 5%;
        }

        /* Tracking Header Premium */
        .tracking-header {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.08), rgba(0, 224, 255, 0.02));
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 242, 254, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .tracking-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,242,254,0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .tracking-number-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .tracking-number {
            font-size: 1.8rem;
            font-family: monospace;
            letter-spacing: 2px;
            font-weight: 700;
            background: rgba(0,242,254,0.1);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(0,242,254,0.3);
        }

        .verified-badge {
            background: rgba(0, 255, 0, 0.12);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #0f0;
            border: 1px solid rgba(0,255,0,0.3);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .status-order_confirmed { background: linear-gradient(135deg, rgba(0,242,254,0.2), rgba(0,242,254,0.05)); color: #00f2fe; border: 1px solid rgba(0,242,254,0.5); }
        .status-picked { background: linear-gradient(135deg, rgba(255,165,0,0.2), rgba(255,165,0,0.05)); color: #ffa500; border: 1px solid rgba(255,165,0,0.5); }
        .status-onway { background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(0,255,255,0.05)); color: #0ff; border: 1px solid rgba(0,255,255,0.5); }
        .status-customs { background: linear-gradient(135deg, rgba(255,68,68,0.2), rgba(255,68,68,0.05)); color: #ff4444; border: 1px solid rgba(255,68,68,0.5); }
        .status-delivered { background: linear-gradient(135deg, rgba(0,255,0,0.2), rgba(0,255,0,0.05)); color: #0f0; border: 1px solid rgba(0,255,0,0.5); }

        .last-updated {
            color: #888;
            font-size: 0.75rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Grid Layout */
        .tracking-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .tracking-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Info Cards Premium */
        .info-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .info-card:hover {
            border-color: rgba(0, 242, 254, 0.4);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.04);
        }

        .info-card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #00f2fe;
            letter-spacing: -0.3px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.9rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
            font-size: 0.85rem;
        }

        .info-value {
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Timeline Premium */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 2rem;
            padding-left: 1.5rem;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #00f2fe;
            transition: all 0.3s;
        }

        .timeline-item.completed::before {
            background: #00f2fe;
            box-shadow: 0 0 12px #00f2fe;
        }

        .timeline-item.active::before {
            background: #00f2fe;
            box-shadow: 0 0 20px #00f2fe;
            animation: pulseGlow 1.2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px #00f2fe; transform: scale(1); }
            50% { box-shadow: 0 0 20px #00f2fe; transform: scale(1.1); }
        }

        .timeline-date {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 0.3rem;
            font-family: monospace;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .timeline-desc {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Map Premium */
        .map-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        #map {
            height: 380px;
            width: 100%;
            background: #0f0f1a;
        }

        .map-caption {
            padding: 1rem;
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.4);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .print-btn, .share-btn {
            flex: 1;
            background: linear-gradient(135deg, #00f2fe, #00e0ff);
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.3s;
            color: #0a0a0f;
        }

        .share-btn {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,242,254,0.3);
        }

        .share-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        /* Not Found */
        .not-found {
            text-align: center;
            padding: 5rem 2rem;
            background: rgba(255,255,255,0.02);
            border-radius: 32px;
            border: 1px solid rgba(255,68,68,0.3);
        }

        .not-found i {
            font-size: 4rem;
            color: #ff4444;
            margin-bottom: 1.5rem;
        }

        .not-found h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .not-found p {
            color: #888;
            margin-bottom: 2rem;
        }

        .not-found-btn {
            display: inline-block;
            background: linear-gradient(135deg, #00f2fe, #00e0ff);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            color: #0a0a0f;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            background: #030308;
            padding: 2rem 5%;
            text-align: center;
            color: #666;
            margin-top: 3rem;
            border-top: 1px solid rgba(0, 242, 254, 0.1);
            font-size: 0.8rem;
        }

        @media print {
            .navbar, .back-link, .action-buttons, .footer, .map-container {
                display: none;
            }
            body {
                background: white;
                color: black;
            }
            .info-card {
                background: white;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
            .tracking-header {
                background: white;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <div class="bg-premium"></div>
    <div class="grid-lines"></div>
    <div class="orb" style="width: 300px; height: 300px; background: rgba(0,242,254,0.08); top: 10%; left: -80px;"></div>
    <div class="orb" style="width: 400px; height: 400px; background: rgba(0,242,254,0.06); bottom: 0%; right: -120px; animation-duration: 25s;"></div>

    <!-- Loading Overlay -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-content">
            <div class="loader-ring">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(0,242,254,0.2)" stroke-width="3"/>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#00f2fe" stroke-width="3" stroke-dasharray="70 210" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="loader-text">ANALYSING PACKAGE DATA</div>
            <div class="loader-dots">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Globe<span style="color:#00f2fe">Swift</span></a>
            <a href="tracking.html" class="back-link"><i class="fas fa-arrow-left"></i> New Tracking</a>
        </div>
    </nav>

    <div class="container" id="trackingContent">
        <div style="text-align: center; padding: 4rem;">
            <i class="fas fa-cloud-upload-alt fa-spin" style="font-size: 2.5rem; color: #00f2fe;"></i>
            <p style="margin-top: 1rem; color: #888;">Fetching package data...</p>
        </div>
    </div>

    <footer class="footer">
        <p><i class="fas fa-cloud"></i> GlobeSwift Elite</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ============================================
        // GLOBESWIFT ELITE SHIPMENT INTELLIGENCE
        // MONGODB CLOUD VERSION
        // ============================================

        const API_URL = window.location.origin;
        let shipmentData = null;
        let trackingNumber = localStorage.getItem('trackingNumber');

        if (!trackingNumber) {
            trackingNumber = 'GL-3722-TAB2NLX6';
        }
        trackingNumber = trackingNumber.toUpperCase();

        // ============================================
        // FETCH FROM MONGODB CLOUD
        // ============================================
        async function fetchShipmentFromCloud(code) {
            try {
                const response = await fetch(`${API_URL}/api/shipments/${code}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        return null;
                    }
                    throw new Error('Network error');
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching from MongoDB:', error);
                return null;
            }
        }

        function getStatusClass(status) {
            const map = {
                'order_confirmed': 'status-order_confirmed',
                'picked': 'status-picked',
                'onway': 'status-onway',
                'customs': 'status-customs',
                'delivered': 'status-delivered'
            };
            return map[status] || 'status-order_confirmed';
        }

        async function renderTracking() {
            const container = document.getElementById('trackingContent');
            
            // Show loading
            container.innerHTML = `
                <div style="text-align: center; padding: 4rem;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; color: #00f2fe;"></i>
                    <p style="margin-top: 1rem; color: #888;">Fetching from MongoDB Cloud...</p>
                </div>
            `;
            
            shipmentData = await fetchShipmentFromCloud(trackingNumber);
            
            if (!shipmentData) {
                container.innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-search"></i>
                        <h2>Tracking Number Not Found</h2>
                        <p>The tracking number <strong>${trackingNumber}</strong> does not exist in our MongoDB Cloud database.</p>
                        <p>Please verify the number and try again.</p>
                        <a href="tracking.html" class="not-found-btn"><i class="fas fa-arrow-left"></i> Try Another Tracking</a>
                    </div>
                `;
                return;
            }

            const statusClass = getStatusClass(shipmentData.status);
            
            container.innerHTML = `
                <div class="tracking-header">
                    <div class="tracking-number-box">
                        <div class="tracking-number"><i class="fas fa-barcode"></i> ${trackingNumber}</div>
                        <div class="verified-badge"><i class="fas fa-cloud"></i> MongoDB Cloud | Verified</div>
                    </div>
                    <div>
                        <div class="status-badge ${statusClass}">
                            <i class="fas ${shipmentData.status === 'delivered' ? 'fa-check-circle' : shipmentData.status === 'customs' ? 'fa-clock' : 'fa-truck'}"></i> ${shipmentData.statusText || shipmentData.status}
                        </div>
                    </div>
                    <div class="last-updated">
                        <i class="fas fa-clock"></i> Last Intelligence Update: ${shipmentData.lastUpdated || new Date().toLocaleString()}
                        <i class="fas fa-database" style="margin-left: auto; font-size: 0.7rem;"></i>
                    </div>
                </div>

                <div class="tracking-grid">
                    <div>
                        <div class="info-card">
                            <h3><i class="fas fa-user-tie"></i> Shipper Information</h3>
                            <div class="info-row">
                                <span class="info-label">Name:</span>
                                <span class="info-value">${shipmentData.sender?.name || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Origin Country:</span>
                                <span class="info-value">${shipmentData.sender?.country || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Contact:</span>
                                <span class="info-value">${shipmentData.sender?.phone || 'N/A'}</span>
                            </div>
                        </div>

                        <div class="info-card" style="margin-top: 1.5rem;">
                            <h3><i class="fas fa-user-check"></i> Consignee Information</h3>
                            <div class="info-row">
                                <span class="info-label">Name:</span>
                                <span class="info-value">${shipmentData.receiver?.name || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Phone:</span>
                                <span class="info-value">${shipmentData.receiver?.phone || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Email:</span>
                                <span class="info-value">${shipmentData.receiver?.email || 'N/A'}</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="info-card">
                            <h3><i class="fas fa-cube"></i> Parcel Intelligence</h3>
                            <div class="info-row">
                                <span class="info-label">Duty & Taxes:</span>
                                <span class="info-value" style="color: ${shipmentData.parcel?.dutyFees === 'Paid' ? '#0f0' : '#ff4444'}"><i class="fas ${shipmentData.parcel?.dutyFees === 'Paid' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${shipmentData.parcel?.dutyFees || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Weight:</span>
                                <span class="info-value">${shipmentData.parcel?.weight || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Category:</span>
                                <span class="info-value">${shipmentData.parcel?.type || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Pickup Date:</span>
                                <span class="info-value">${shipmentData.parcel?.pickupDate || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">ETA:</span>
                                <span class="info-value">${shipmentData.parcel?.expectedDelivery || 'Pending'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Current Status:</span>
                                <span class="info-value">${shipmentData.parcel?.trackingStatus || shipmentData.statusText || 'N/A'}</span>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button class="print-btn" onclick="window.print()"><i class="fas fa-print"></i> Print Receipt</button>
                            <button class="share-btn" onclick="copyTrackingLink()"><i class="fas fa-share-alt"></i> Share Tracking</button>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <h3><i class="fas fa-timeline"></i> Shipment Journey</h3>
                    <div class="timeline">
                        ${(shipmentData.timeline || []).map(item => `
                            <div class="timeline-item ${item.completed ? 'completed' : ''} ${item.active ? 'active' : ''}">
                                <div class="timeline-date">${item.date}</div>
                                <div class="timeline-title">${item.title}</div>
                                <div class="timeline-desc">${item.desc}</div>
                            </div>
                        `).join('')}
                        ${(!shipmentData.timeline || shipmentData.timeline.length === 0) ? '<div style="color:#888; text-align:center; padding:1rem;">Timeline data pending</div>' : ''}
                    </div>
                </div>

                <div class="map-container">
                    <div id="map"></div>
                    <div class="map-caption">
                        <i class="fas fa-map-marker-alt"></i> Current Location Intelligence | <strong>Origin: ${shipmentData.origin || 'Unknown'}</strong> → Destination: ${shipmentData.destination || 'Unknown'}
                        <br><small>Powered by GlobeSwift Satellite Network | Data from MongoDB Cloud</small>
                    </div>
                </div>
            `;

            // Initialize map
            setTimeout(() => {
                if (typeof L !== 'undefined') {
                    const coords = shipmentData.coordinates || [25.2048, 55.2708];
                    const map = L.map('map').setView(coords, 5);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap contributors',
                        subdomains: 'abcd'
                    }).addTo(map);
                    
                    const customIcon = L.divIcon({
                        html: '<div style="background: #00f2fe; width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 15px #00f2fe; border: 2px solid white;"></div>',
                        iconSize: [14, 14],
                        className: 'custom-marker'
                    });
                    
                    L.marker(coords, { icon: customIcon }).addTo(map)
                        .bindPopup(`<b>${shipmentData.origin || 'Origin'}</b><br>Shipment: ${shipmentData.statusText || shipmentData.status}`)
                        .openPopup();
                }
            }, 100);
        }

        function copyTrackingLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url);
            alert('✓ Tracking link copied to clipboard');
        }

        // Hide loader after content loads
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loaderOverlay');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 600);
                }
                renderTracking();
            }, 500);
        });
    </script>
</body>
</html>
