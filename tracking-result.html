<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Tracking Result - GlobeSwift</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 5%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .back-link {
            color: #00f2fe;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 5%;
        }

        /* Tracking Header */
        .tracking-header {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(0, 224, 255, 0.05));
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .tracking-number-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .tracking-number {
            font-size: 1.8rem;
            font-family: monospace;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .verified-badge {
            background: rgba(0, 255, 0, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #0f0;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 1rem;
        }

        .status-order-confirmed { background: rgba(0, 242, 254, 0.2); color: #00f2fe; }
        .status-picked { background: rgba(255, 165, 0, 0.2); color: #ffa500; }
        .status-onway { background: rgba(0, 255, 255, 0.2); color: #0ff; }
        .status-customs { background: rgba(255, 0, 0, 0.2); color: #ff4444; }
        .status-delivered { background: rgba(0, 255, 0, 0.2); color: #0f0; }

        .last-updated {
            color: #888;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        /* Grid Layout */
        .tracking-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .tracking-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Info Cards */
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            color: #888;
        }

        .info-value {
            font-weight: 500;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 2rem;
            padding-left: 1.5rem;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 0;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            border: 2px solid #00f2fe;
        }

        .timeline-item.completed::before {
            background: #00f2fe;
        }

        .timeline-item.active::before {
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .timeline-date {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.3rem;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .timeline-desc {
            font-size: 0.85rem;
            color: #aaa;
        }

        /* Map */
        .map-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        #map {
            height: 400px;
            width: 100%;
            background: #1a1a2e;
        }

        .map-caption {
            padding: 1rem;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }

        /* Print Button */
        .print-btn {
            background: linear-gradient(135deg, #00f2fe, #00e0ff);
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            width: 100%;
            justify-content: center;
        }

        .footer {
            background: #050508;
            padding: 2rem 5%;
            text-align: center;
            color: #666;
            margin-top: 3rem;
        }

        @media print {
            .navbar, .back-link, .print-btn, .footer {
                display: none;
            }
            body {
                background: white;
                color: black;
            }
            .info-card {
                background: white;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
