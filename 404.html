<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | GlobeSwift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; padding: 2rem; }
        .error-code { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg,#00f2fe,#fff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 1rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #aaa; margin-bottom: 2rem; }
        .home-btn { display: inline-block; background: linear-gradient(135deg,#00f2fe,#00e0ff); padding: 1rem 2rem; border-radius: 50px; text-decoration: none; font-weight: 600; color: #0a0a0f; }
        .home-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,242,254,0.3); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html" class="home-btn"><i class="fas fa-home"></i> Back to Home</a>
    </div>
</body>
</html>
