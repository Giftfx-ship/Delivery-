<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GlobeSwift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f, #030308);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .badge {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 2rem;
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            color: #fff;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #00f2fe;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 1rem;
            color: #fff;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00f2fe, #00e0ff);
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #0a0a0f;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
        }

        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link a:hover {
            color: #00f2fe;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Globe<span style="color:#00f2fe">Swift</span></div>
        <div class="badge">Administrator Portal</div>
        <h2><i class="fas fa-shield-alt"></i> Secure Login</h2>
        
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <div id="errorMsg" class="error"></div>
        </form>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Default credentials - YOU CAN CHANGE THESE
            if (username === 'igwe' && password === 'igwemyboss') {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('errorMsg').innerHTML = '❌ Invalid credentials. Access denied.';
            }
        }
    </script>
</body>
</html>
