<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GlobeSwift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; }

        .navbar {
            background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); padding: 1rem 5%;
            border-bottom: 1px solid rgba(0,242,254,0.2); position: sticky; top: 0; z-index: 100;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg,#fff,#00f2fe); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .logout-btn { background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 50px; color: #fff; text-decoration: none; transition: 0.3s; }
        .logout-btn:hover { background: #ff4444; }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 5%; }
        .dashboard-header { margin-bottom: 2rem; text-align: center; }
        .dashboard-header h1 { font-size: 2rem; background: linear-gradient(135deg,#fff,#00f2fe); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .btn-primary { background: linear-gradient(135deg,#00f2fe,#00e0ff); border: none; padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 600; color: #0a0a0f; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,242,254,0.3); }
        
        .card { background: rgba(255,255,255,0.03); border-radius: 24px; padding: 2rem; margin-bottom: 2rem; border: 1px solid rgba(0,242,254,0.2); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00f2fe; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .section-title { margin: 1.5rem 0 1rem; color: #00f2fe; font-size: 1rem; border-left: 3px solid #00f2fe; padding-left: 0.8rem; }
        .footer { text-align: center; padding: 2rem; color: #666; margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05); }
        .success-msg { background: rgba(0,255,0,0.1); border: 1px solid #0f0; padding: 1rem; border-radius: 12px; text-align: center; color: #0f0; display: none; margin-top: 1rem; }
        .error-msg { background: rgba(255,0,0,0.1); border: 1px solid #ff4444; padding: 1rem; border-radius: 12px; text-align: center; color: #ff4444; display: none; margin-top: 1rem; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Globe<span style="color:#00f2fe">Swift</span></a>
            <a href="#" class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1>Add New Shipment</h1>
        </div>

        <div class="card">
            <form id="shipmentForm" onsubmit="saveShipment(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>TRACKING NUMBER *</label>
                        <input type="text" id="trackingCode" placeholder="e.g., 5454848 or GL-123-ABC" required>
                    </div>
                    <div class="form-group">
                        <label>STATUS *</label>
                        <select id="status">
                            <option value="order_confirmed">Order Confirmed</option>
                            <option value="picked">Picked by Courier</option>
                            <option value="onway">On The Way</option>
                            <option value="customs">Custom Hold</option>
                            <option value="delivered">Delivered</option>
                        </select>
                    </div>
                </div>

                <div class="section-title">SENDER INFORMATION</div>
                <div class="form-row">
                    <div class="form-group"><label>Sender Name *</label><input type="text" id="senderName" required></div>
                    <div class="form-group"><label>Country *</label><input type="text" id="senderCountry" required></div>
                </div>
                <div class="form-group"><label>Address</label><input type="text" id="senderAddress"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="senderPhone"></div>

                <div class="section-title">RECEIVER INFORMATION</div>
                <div class="form-row">
                    <div class="form-group"><label>Receiver Name *</label><input type="text" id="receiverName" required></div>
                    <div class="form-group"><label>Country *</label><input type="text" id="receiverCountry" required></div>
                </div>
                <div class="form-group"><label>Address</label><input type="text" id="receiverAddress"></div>
                <div class="form-row">
                    <div class="form-group"><label>Phone</label><input type="text" id="receiverPhone"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="receiverEmail"></div>
                </div>

                <div class="section-title">PARCEL INFORMATION</div>
                <div class="form-row">
                    <div class="form-group"><label>Weight (kg)</label><input type="text" id="weight" placeholder="2.5 kg"></div>
                    <div class="form-group"><label>Type</label><input type="text" id="type" placeholder="Documents, Electronics"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>DUTY FEES STATUS</label><select id="dutyFeesStatus"><option value="Paid">Paid</option><option value="Pending">Pending</option></select></div>
                    <div class="form-group"><label>DUTY FEES AMOUNT</label><input type="text" id="dutyFeesAmount" placeholder="EUR 50.00"></div>
                </div>
                <div class="form-group"><label>Expected Delivery</label><input type="text" id="expectedDelivery" placeholder="Mar 28, 2026"></div>

                <div class="section-title">INVOICE DETAILS</div>
                <div class="form-row">
                    <div class="form-group"><label>Order ID</label><input type="text" id="orderId" placeholder="e.g., 326"></div>
                    <div class="form-group"><label>Booking Mode</label><select id="bookingMode"><option value="ToPay">ToPay</option><option value="Prepaid">Prepaid</option><option value="Standard">Standard</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Shipping Cost</label><input type="text" id="shipmentCost" placeholder="EUR 300"></div>
                    <div class="form-group"><label>Clearance Cost</label><input type="text" id="clearanceCost" placeholder="EUR 350"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Total Amount</label><input type="text" id="totalAmount" placeholder="EUR 650"></div>
                    <div class="form-group"><label>Payment Status</label><select id="paymentStatus"><option value="To Pay on Delivery">To Pay on Delivery</option><option value="Paid">Paid</option><option value="Pending">Pending</option></select></div>
                </div>
                <div class="form-group"><label>Origin Coordinates</label><input type="text" id="coordinates" placeholder="25.2048, 55.2708"></div>

                <div id="successMsg" class="success-msg"><i class="fas fa-check-circle"></i> Shipment saved successfully!</div>
                <div id="errorMsg" class="error-msg"><i class="fas fa-exclamation-triangle"></i> Error: Tracking code already exists!</div>
                
                <button type="submit" class="btn-primary" style="width:100%; margin-top:1.5rem;"><i class="fas fa-save"></i> Save Shipment</button>
            </form>
        </div>
    </div>

    <footer class="footer"><p>GlobeSwift Admin</p></footer>

    <script>
        const API_URL = window.location.origin;

        async function saveShipment(event) {
            event.preventDefault();
            
            // Hide messages
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            
            // Get tracking code
            const trackingField = document.getElementById('trackingCode');
            if (!trackingField) {
                alert('ERROR: Tracking code field not found!');
                return;
            }
            
            const trackingCode = trackingField.value.trim();
            if (!trackingCode) {
                alert('Please enter a tracking number');
                trackingField.focus();
                return;
            }
            
            const upperCode = trackingCode.toUpperCase();
            const status = document.getElementById('status').value;
            
            const statusMap = {
                'order_confirmed': 'Order Confirmed',
                'picked': 'Picked by Courier',
                'onway': 'On The Way',
                'customs': 'Custom Hold',
                'delivered': 'Delivered'
            };
            
            let coords = [25.2048, 55.2708];
            const coordsInput = document.getElementById('coordinates').value;
            if (coordsInput && coordsInput.trim()) {
                const parts = coordsInput.split(',').map(Number);
                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    coords = parts;
                }
            }
            
            const now = new Date().toLocaleString();
            const dutyAmount = document.getElementById('dutyFeesAmount').value.trim();
            const dutyStatus = document.getElementById('dutyFeesStatus').value;
            
            const newShipment = {
                status: status,
                statusText: statusMap[status],
                lastUpdated: now,
                sender: {
                    name: document.getElementById('senderName').value || 'N/A',
                    country: document.getElementById('senderCountry').value || 'Unknown',
                    address: document.getElementById('senderAddress').value || '',
                    phone: document.getElementById('senderPhone').value || 'N/A'
                },
                receiver: {
                    name: document.getElementById('receiverName').value || 'N/A',
                    country: document.getElementById('receiverCountry').value || 'Unknown',
                    address: document.getElementById('receiverAddress').value || '',
                    phone: document.getElementById('receiverPhone').value || 'N/A',
                    email: document.getElementById('receiverEmail').value || 'N/A'
                },
                parcel: {
                    weight: document.getElementById('weight').value || 'N/A',
                    type: document.getElementById('type').value || 'N/A',
                    dutyFeesStatus: dutyStatus,
                    dutyFeesAmount: dutyAmount || 'N/A',
                    pickupDate: now,
                    expectedDelivery: document.getElementById('expectedDelivery').value || 'Pending',
                    trackingStatus: statusMap[status]
                },
                invoice: {
                    orderId: document.getElementById('orderId').value || Math.floor(Math.random() * 9000 + 1000).toString(),
                    bookingMode: document.getElementById('bookingMode').value,
                    shipmentCost: document.getElementById('shipmentCost').value || 'N/A',
                    clearanceCost: document.getElementById('clearanceCost').value || 'N/A',
                    totalAmount: document.getElementById('totalAmount').value || 'N/A',
                    paymentStatus: document.getElementById('paymentStatus').value
                },
                origin: document.getElementById('senderCountry').value || 'Unknown',
                destination: document.getElementById('receiverCountry').value || 'Unknown',
                coordinates: coords
            };

            try {
                console.log('Saving tracking number:', upperCode);
                const response = await fetch(`${API_URL}/api/shipments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trackingCode: upperCode, ...newShipment })
                });
                
                const result = await response.json();
                if (!response.ok) {
                    if (response.status === 409) {
                        document.getElementById('errorMsg').style.display = 'block';
                    } else {
                        throw new Error(result.error || 'Failed to save');
                    }
                    return;
                }
                
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('shipmentForm').reset();
                document.getElementById('status').value = 'order_confirmed';
                document.getElementById('dutyFeesStatus').value = 'Paid';
                document.getElementById('coordinates').value = '25.2048, 55.2708';
                
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 3000);
                
            } catch (error) {
                console.error('Save error:', error);
                alert('Error: ' + error.message);
            }
        }

        function logout() { 
            localStorage.removeItem('adminLoggedIn'); 
            window.location.href = 'admin-login.html'; 
        }
        
        function checkLogin() { 
            if (!localStorage.getItem('adminLoggedIn')) {
                window.location.href = 'admin-login.html';
            }
        }
        
        checkLogin();
    </script>
</body>
</html>
